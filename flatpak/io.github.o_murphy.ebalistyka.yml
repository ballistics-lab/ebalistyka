app-id: io.github.o_murphy.ebalistyka
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.llvm20
command: ebalistyka
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
modules:
  - name: bclibc
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBCLIBC_BUILD_TESTS=OFF
    sources:
      - type: git
        url: https://github.com/ballistics-lab/bclibc.git
        tag: v1.0.6
        commit: 26cb17bca86a52d58a05dff07ddfb62ce98445e2
  - name: ebalistyka
    buildsystem: simple
    build-options:
      arch:
        x86_64:
          env:
            BUNDLE_PATH: build/linux/x64/release/bundle
        aarch64:
          env:
            BUNDLE_PATH: build/linux/arm64/release/bundle
      append-path: /usr/lib/sdk/llvm20/bin:/run/build/ebalistyka/flutter/bin
      prepend-ld-library-path: /usr/lib/sdk/llvm20/lib
      env:
        PUB_CACHE: /run/build/ebalistyka/.pub-cache
        OBJECTBOX_PREBUILT_DIR: /run/build/ebalistyka/objectbox-c
    build-commands:
      - cp flutter/bin/internal/engine.version flutter/bin/cache/engine-dart-sdk.stamp
      - cp flutter/bin/internal/material_fonts.version flutter/bin/cache/material_fonts.stamp
      - cp flutter/bin/internal/gradle_wrapper.version flutter/bin/cache/gradle_wrapper.stamp
      - cp flutter/bin/internal/engine.version flutter/bin/cache/engine_stamp.stamp
      - cp flutter/bin/internal/engine.version flutter/bin/cache/flutter_sdk.stamp
      - cp flutter/bin/internal/engine.version flutter/bin/cache/font-subset.stamp
      - cp flutter/bin/internal/engine.version flutter/bin/cache/linux-sdk.stamp
      - setup-flutter.sh
      - flutter build linux --release --no-pub
      - mkdir -p /app/ebalistyka
      - cp -r "$BUNDLE_PATH"/. /app/ebalistyka/
      - install -Dm755 flatpak/ebalistyka-wrapper.sh /app/bin/ebalistyka
      - install -Dm644 flatpak/io.github.o_murphy.ebalistyka.desktop /app/share/applications/io.github.o_murphy.ebalistyka.desktop
      - install -Dm644 assets/icon_512x512.png /app/share/icons/hicolor/512x512/apps/io.github.o_murphy.ebalistyka.png
      - |
        VERSION=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//' | sed 's/+.*//')
        TODAY=$(date +%Y-%m-%d)
        sed -i "s|<release version=\"[^\"]*\" date=\"[^\"]*\"/>|<release version=\"${VERSION}\" date=\"${TODAY}\"/>|" flatpak/io.github.o_murphy.ebalistyka.metainfo.xml
      - install -Dm644 flatpak/io.github.o_murphy.ebalistyka.metainfo.xml /app/share/metainfo/io.github.o_murphy.ebalistyka.metainfo.xml
    sources:
      - type: git
        url: https://github.com/o-murphy/ebalistyka-app.git
        tag: v0.1.15-beta.1
        commit: 305c6b44c9ad2ff6e4686419b3fe113843e9584f
        disable-submodules: true
      - type: archive
        only-arches:
          - x86_64
        url: https://github.com/objectbox/objectbox-c/releases/download/v5.3.1/objectbox-linux-x64.tar.gz
        sha256: d1a22f5a43e8aa438c987524c2ef97f5d179acb991b0f63ab03a30c33b882368
        dest: objectbox-c
        strip-components: 0
      - type: archive
        only-arches:
          - aarch64
        url: https://github.com/objectbox/objectbox-c/releases/download/v5.3.1/objectbox-linux-aarch64.tar.gz
        sha256: 948fe456904b8b0ae6b22a26a9f460734dc3c2ec58750df3a329ccae1ebe035d
        dest: objectbox-c
        strip-components: 0
      - generated-sources.json
      - type: patch
        dest: .pub-cache/hosted/pub.dev/objectbox_flutter_libs-5.3.1
        path: patches/objectbox_flutter_libs/CMakeLists.txt.patch
