app-id: io.github.o_murphy.ebalistyka
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: ebalistyka

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --talk-name=org.freedesktop.portal.Desktop

modules:
  - name: ebalistyka
    buildsystem: simple
    build-commands:
      - mkdir -p /app/ebalistyka
      - cp ebalistyka /app/ebalistyka/
      - cp -r lib /app/ebalistyka/lib
      - cp -r data /app/ebalistyka/data
      - install -Dm755 ebalistyka-wrapper.sh /app/bin/ebalistyka
      - install -Dm644 io.github.o_murphy.ebalistyka.desktop
          /app/share/applications/io.github.o_murphy.ebalistyka.desktop
      - install -Dm644 io.github.o_murphy.ebalistyka.png
          /app/share/icons/hicolor/512x512/apps/io.github.o_murphy.ebalistyka.png
      - install -Dm644 io.github.o_murphy.ebalistyka.metainfo.xml
          /app/share/metainfo/io.github.o_murphy.ebalistyka.metainfo.xml
    sources:
      # Pre-built Flutter bundle from GitHub Releases (arch-specific)
      - type: archive
        only-arches:
          - x86_64
        url: https://github.com/o-murphy/ebalistyka-app/releases/download/v__VERSION__/ebalistyka_linux_x86_64.tar.gz
        sha256: __SHA256_X86_64__
        strip-components: 1
      - type: archive
        only-arches:
          - aarch64
        url: https://github.com/o-murphy/ebalistyka-app/releases/download/v__VERSION__/ebalistyka_linux_aarch64.tar.gz
        sha256: __SHA256_AARCH64__
        strip-components: 1
      # Static files committed to the Flathub repo alongside the manifest
      - type: file
        path: ebalistyka-wrapper.sh
      - type: file
        path: io.github.o_murphy.ebalistyka.desktop
      - type: file
        path: io.github.o_murphy.ebalistyka.metainfo.xml
      - type: file
        path: io.github.o_murphy.ebalistyka.png
