name: Pin Flatpak Manifest

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to pin (e.g. v0.1.15)"
        required: true
        type: string
      dry_run:
        description: "Dry run: commit but do not push"
        required: false
        type: boolean
        default: false

jobs:
  pin:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - uses: o-murphy/flutpak/.github/actions/pin-manifest@main
        with:
          tag_name: ${{ inputs.tag_name }}

      - name: Commit pinned flatpak files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flatpak/
          git diff --cached --quiet || \
            git commit -m "chore: pin flatpak manifest and sources to ${{ inputs.tag_name }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "Dry run — skipping push"
            git show --stat HEAD
          else
            git push origin main
          fi
