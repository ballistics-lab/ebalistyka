name: Pin Flatpak Manifest

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to pin (e.g. v0.1.15)"
        required: true
        type: string

jobs:
  pin:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Resolve commit SHA for ${{ inputs.tag_name }}
        id: meta
        run: |
          COMMIT=$(git rev-list -n 1 "${{ inputs.tag_name }}")
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT

      - name: Read Flutter version
        id: flutter-ver
        run: echo "version=$(cat flatpak/flutter.version)" >> $GITHUB_OUTPUT

      - name: Install Flutter ${{ steps.flutter-ver.outputs.version }}
        run: |
          FLUTTER_DIR="$RUNNER_TEMP/flutter"
          git clone --depth 1 \
            --branch "${{ steps.flutter-ver.outputs.version }}" \
            https://github.com/flutter/flutter.git \
            "$FLUTTER_DIR"
          echo "$FLUTTER_DIR/bin" >> $GITHUB_PATH
          echo "FLUTTER_ROOT=$FLUTTER_DIR" >> $GITHUB_ENV

      - name: Get dependencies
        run: flutter pub get

      - name: Resolve flutter_tools pubspec.lock
        run: |
          FLUTTER_TOOLS_LOCK="$FLUTTER_ROOT/packages/flutter_tools/pubspec.lock"
          if [ ! -f "$FLUTTER_TOOLS_LOCK" ]; then
            (cd "$FLUTTER_ROOT/packages/flutter_tools" && dart pub get --no-example 2>&1)
          fi

      - name: Generate sources and pin manifest to ${{ inputs.tag_name }}
        run: |
          dart run flutpak prepare \
            --tag "${{ inputs.tag_name }}" \
            --commit "${{ steps.meta.outputs.commit }}" \
            --sdk "$FLUTTER_ROOT"

      - name: Commit pinned flatpak files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flatpak/io.github.o_murphy.ebalistyka.yml \
                  flatpak/io.github.o_murphy.ebalistyka.metainfo.xml \
                  flatpak/generated-sources.json
          git diff --cached --quiet || \
            git commit -m "chore: pin flatpak manifest and sources to ${{ inputs.tag_name }}"
          git push origin main