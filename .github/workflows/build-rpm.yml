name: Build rpm

on:
  # pull_request:
  #   branches: [ main, develop ]
  #   paths:
  #     - "lib/**"
  #     - "linux/**"
  #     - "external/**"
  #     - "packages/bclibc_ffi/**"
  #     - "pubspec.yaml"
  #     - "rpm/**"
  #     - "flatpak/*.desktop"
  #     - "flatpak/*.metainfo.xml"
  #     - ".github/workflows/build-rpm.yml"
  #     - ".github/workflows/build.yml"
  workflow_call:
    inputs:
      arch:
        description: "Target architecture"
        required: true
        type: string   # amd64 | arm64
      build_name:
        description: "Version name override (leave empty to use pubspec.yaml)"
        required: false
        type: string
        default: ""
      retention_days:
        description: "Artifact retention in days"
        required: false
        type: number
        default: 2
      bundle_artifact_name:
        description: "Pre-built bundle artifact name (skips build-bundle job)"
        required: false
        type: string
        default: ""
    outputs:
      artifact_name:
        description: "Name of the uploaded artifact"
        value: ${{ jobs.package.outputs.artifact_name }}
      artifact_url:
        description: "URL to download the artifact"
        value: ${{ jobs.package.outputs.artifact_url }}
  workflow_dispatch:
    inputs:
      arch:
        description: "Target architecture"
        required: true
        default: "amd64"
        type: choice
        options: [ amd64, arm64 ]
      build_name:
        description: "Version name override (leave empty to use pubspec.yaml)"
        required: false
        default: ""
        type: string

concurrency:
  group: build-rpm-${{ github.ref }}-${{ inputs.arch || 'amd64' }}
  cancel-in-progress: true

jobs:
  build-bundle:
    if: inputs.bundle_artifact_name == ''
    uses: ./.github/workflows/build.yml
    with:
      platform: linux
      arch: ${{ inputs.arch || 'amd64' }}
      build_type: release
      build_name: ${{ inputs.build_name || '' }}
      retention_days: 2

  package:
    needs: build-bundle
    if: always() && (needs.build-bundle.result == 'success' || needs.build-bundle.result == 'skipped')
    name: rpm-${{ inputs.arch || 'amd64' }}
    runs-on: ${{ inputs.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      pull-requests: write
      issues: write

    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
      artifact_url:  ${{ steps.upload.outputs.artifact-url }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set build metadata
        id: meta
        run: |
          BUILD_NAME="${{ inputs.build_name }}"
          if [ -z "$BUILD_NAME" ]; then
            BUILD_NAME=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//' | sed 's/+.*//')
          fi
          BUILD_NAME="${BUILD_NAME#v}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BUILD_NAME="${BUILD_NAME%%-*}-pr.${{ github.event.number }}"
          fi
          BUILD_NUMBER=$(git rev-list --count --first-parent HEAD)
          ARCH="${{ inputs.arch || 'amd64' }}"
          if [ "$ARCH" = "amd64" ]; then ARCH_SUFFIX="x86_64"; else ARCH_SUFFIX="aarch64"; fi
          echo "build_name=$BUILD_NAME"     >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "arch_suffix=$ARCH_SUFFIX"   >> $GITHUB_OUTPUT
          echo "artifact_name=ebalistyka-rpm-${ARCH_SUFFIX}-${BUILD_NAME}-${BUILD_NUMBER}" >> $GITHUB_OUTPUT

      - name: Download bundle artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.bundle_artifact_name || needs.build-bundle.outputs.artifact_name }}
          path: dl

      - name: Extract bundle
        run: |
          ARCH_SUFFIX="${{ steps.meta.outputs.arch_suffix }}"
          mkdir -p bundle
          tar -xzf "dl/portable/ebalistyka_linux_${ARCH_SUFFIX}.tar.gz" -C bundle/

      - name: Install packaging tools
        run: sudo apt-get install -y --no-install-recommends rpm

      - name: Package rpm
        run: |
          bash scripts/package-rpm.sh \
            bundle \
            "${{ steps.meta.outputs.arch_suffix }}" \
            "${{ steps.meta.outputs.build_name }}" \
            "${{ steps.meta.outputs.build_number }}"

      - name: Upload artifact
        id: upload
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: artifacts/rpm/
          retention-days: ${{ inputs.retention_days || 2 }}
          if-no-files-found: error

      - name: Post PR summary
        if: always() && github.event_name == 'pull_request'
        uses: ./.github/actions/pr-summary
        with:
          platform: Linux rpm (${{ inputs.arch || 'amd64' }})
          build_result: ${{ job.status }}
          artifact_name: ${{ steps.meta.outputs.artifact_name }}
          artifact_url: ${{ steps.upload.outputs.artifact-url }}
