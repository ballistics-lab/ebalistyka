name: Publish

on:
  release:
    types: [ published ]
  workflow_call:
    inputs:
      tag_name:
        description: "Release tag to download snaps from"
        required: true
        type: string
      channel:
        description: "Snap store channel (stable | beta | edge)"
        required: false
        type: string
        default: stable

jobs:
  snap:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs-on: ubuntu-latest
            snap: ebalistyka_linux_x86_64.snap
          - arch: arm64
            runs-on: ubuntu-24.04-arm
            snap: ebalistyka_linux_aarch64.snap
    runs-on: ${{ matrix.runs-on }}
    steps:
      - name: Download snap from release
        run: |
          gh release download "${{ inputs.tag_name || github.event.release.tag_name }}" \
            --pattern "${{ matrix.snap }}" \
            --dir snap
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Snap Store
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: snap/${{ matrix.snap }}
          release: ${{ inputs.channel || (github.event.release.prerelease && 'beta' || 'stable') }}

  aur:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Update PKGBUILD checksums
        run: |
          TAG="${{ inputs.tag_name || github.event.release.tag_name }}"
          bash scripts/update-aur.sh "${TAG#v}"

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3
        with:
          pkgname: ebalistyka-bin
          pkgbuild: aur/PKGBUILD
          commit_username: o-murphy
          commit_email: thehelixpg@gmail.com
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: "upgpkg: ebalistyka-bin ${{ inputs.tag_name || github.event.release.tag_name }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519
