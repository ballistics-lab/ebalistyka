name: Build Flatpak

on:
  pull_request:
    paths:
      - "app/**"
      - "lib/**"
      - "linux/**"
      - "external/**"
      - "packages/bclibc_ffi/**"
      - "pubspec.yaml"
      - "flatpak/**"
      - "scripts/ci-common.sh"
      - "scripts/package-flatpak.sh"
      - ".github/workflows/build-flatpak.yml"
  workflow_call:
    inputs:
      arch:
        description: "Target architecture"
        required: true
        type: string   # amd64 | arm64
      build_name:
        description: "Version name override (leave empty to use pubspec.yaml)"
        required: false
        type: string
        default: ""
      retention_days:
        description: "Artifact retention in days"
        required: false
        type: number
        default: 2
      tag:
        description: "Git tag to build"
        required: false
        type: string
        default: ""
    outputs:
      artifact_name:
        description: "Name of the uploaded artifact"
        value: ${{ jobs.build.outputs.artifact_name }}
      artifact_url:
        description: "URL to download the artifact"
        value: ${{ jobs.build.outputs.artifact_url }}
  workflow_dispatch:
    inputs:
      arch:
        description: "Target architecture"
        required: true
        default: "amd64"
        type: choice
        options: [ amd64, arm64 ]
      build_name:
        description: "Version name override (leave empty to use pubspec.yaml)"
        required: false
        default: ""
        type: string
      tag:
        description: "Git tag to build"
        required: false
        default: ""
        type: string

concurrency:
  group: build-flatpak-${{ github.ref }}-${{ inputs.arch || 'all' }}
  cancel-in-progress: true

jobs:
  generate:
    name: Generate Flatpak manifest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read Flutter version
        id: flutter-ver
        run: echo "version=$(cat flatpak/flutter.version)" >> $GITHUB_OUTPUT

      - name: Install Flutter ${{ steps.flutter-ver.outputs.version }}
        id: flutter
        uses: o-murphy/flutpak/.github/actions/flutter@v0.4.0-rc.2
        with:
          flutter-version: ${{ steps.flutter-ver.outputs.version }}
          cache: true

      - name: Set FLUTTER_ROOT
        run: echo "FLUTTER_ROOT=${{ steps.flutter.outputs.flutter-path }}" >> $GITHUB_ENV

      - name: Get dependencies
        run: flutter pub get

      - name: Generate manifest and validate
        uses: o-murphy/flutpak/.github/actions/generate@v0.4.0-rc.2
        with:
          tag: ${{ inputs.tag }}
          commit: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          metainfo-path: app/share/metainfo/io.github.o_murphy.ebalistyka.metainfo.xml
          artifact-name: flutpak-artifacts-${{ inputs.arch || 'pr' }}

  build:
    name: flatpak-${{ matrix.arch }}
    needs: generate
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ github.event_name == 'pull_request' && fromJSON('["amd64","arm64"]') || fromJSON(format('["{0}"]', inputs.arch || 'amd64')) }}
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      pull-requests: write
      issues: write

    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
      artifact_url:  ${{ steps.build-flatpak.outputs.artifact-url }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set build metadata
        id: meta
        shell: bash
        env:
          INPUT_BUILD_NAME: ${{ inputs.build_name }}
          MATRIX_ARCH: ${{ matrix.arch }}
          PR_NUMBER: ${{ github.event.number }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          source scripts/ci-common.sh
          source scripts/package-flatpak.sh
          set_build_metadata "ebalistyka-flatpak"
          set_flatpak_bundle_output

      - name: Download generated Flatpak sources
        uses: actions/download-artifact@v8
        with:
          name: flutpak-artifacts-${{ inputs.arch || 'pr' }}
          path: flatpak/generated

      - name: Cache Flatpak installation (org.flatpak.Builder + runtimes)
        uses: actions/cache@v5
        with:
          path: ~/.local/share/flatpak
          key: flatpak-builder-25.08-llvm20-${{ runner.arch }}-v1

      - name: Cache flatpak-builder downloads
        uses: actions/cache@v5
        with:
          path: .flatpak-builder/downloads
          key: flatpak-dl-${{ steps.meta.outputs.arch_suffix }}-${{ hashFiles('flatpak/generated/io.github.o_murphy.ebalistyka.yml', 'pubspec.lock', 'flatpak/flutter.version') }}
          restore-keys: flatpak-dl-${{ steps.meta.outputs.arch_suffix }}-

      - name: Build Flatpak
        id: build-flatpak
        uses: o-murphy/flutpak/.github/actions/build-flatpak@v0.4.0-rc.2
        with:
          manifest: flatpak/generated/io.github.o_murphy.ebalistyka.yml
          app-id: io.github.o_murphy.ebalistyka
          arch: ${{ steps.meta.outputs.arch_suffix }}
          bundle: ${{ steps.meta.outputs.bundle }}
          artifact-name: ${{ steps.meta.outputs.artifact_name }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          retention-days: ${{ inputs.retention_days || 2 }}

      - name: Post PR summary
        if: always() && github.event_name == 'pull_request'
        uses: ./.github/actions/pr-summary
        with:
          platform: Linux Flatpak (${{ matrix.arch }})
          build_result: ${{ job.status }}
          artifact_name: ${{ steps.meta.outputs.artifact_name }}
          artifact_url: ${{ steps.build-flatpak.outputs.artifact-url }}
